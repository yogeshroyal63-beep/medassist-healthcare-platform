version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ai-service:
    build: ./ai_service
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - BACKEND_URL=http://backend:5000

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/medassist
      - JWT_SECRET=your_jwt_secret_here
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=http://localhost
    depends_on:
      - mongo
      - ai-service

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data: